<button
  class="option"
  [class.selected]="selected()"
  (click)="select.emit(quality())"
  [attr.aria-pressed]="selected()"
>
  <span class="text">
    <span class="res">{{ label().res }}p</span>
    <span class="qlabel"> ({{ label().label }})</span>
  </span>
  @if (selected()) {
    <svg class="check" width="1.25rem" height="1.25rem" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
      <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/>
    </svg>
  }
</button>
