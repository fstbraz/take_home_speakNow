<div class="backdrop" (click)="cancel.emit()" role="dialog" aria-modal="true" aria-label="Confirm delete">
  <div class="dialog" (click)="$event.stopPropagation()">

    <button class="btn-x" (click)="cancel.emit()" aria-label="Close">
      <svg width="1.25rem" height="1.25rem" viewBox="0 0 24 24" fill="currentColor">
        <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
      </svg>
    </button>

    <div class="body">
      <svg width="2.5rem" height="2.5rem" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <circle cx="12" cy="12" r="10" stroke="#e53f28" stroke-width="2"/>
        <path d="M12 7v6" stroke="#e53f28" stroke-width="2" stroke-linecap="round"/>
        <circle cx="12" cy="17" r="1" fill="#e53f28"/>
      </svg>
      <h2 class="heading">Delete this video?</h2>
      <p class="sub">Are you sure you want to delete this video? This action cannot be undone.</p>
    </div>

    <div class="actions">
      <button class="btn btn-cancel" (click)="cancel.emit()">Cancel</button>
      <button class="btn btn-delete" (click)="confirm.emit(videoId())">Delete video</button>
    </div>

  </div>
</div>
