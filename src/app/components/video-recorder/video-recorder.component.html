<div class="recorder-layout">

  <!-- Left: camera preview with overlaid controls -->
  <div class="preview-col">
    @if (status() === 'initializing') {
      <app-spinner />
    } @else if (isError()) {
      <div class="error-state" role="alert">
        <span class="error-icon" aria-hidden="true">⚠</span>
        <p>{{ errorMessage() }}</p>
      </div>
    } @else {
      <app-video-preview [stream]="stream()" />
    }

    <!-- Record / stop pill — centered at bottom of preview -->
    @if (!isError()) {
      <div class="controls-overlay">
        <app-recorder-controls
          [status]="status()"
          (record)="onRecord()"
          (stop)="onStop()"
        />
      </div>
    }
  </div>

  <!-- Settings button — bottom-left, overlaid on layout -->
  <button class="settings-btn" (click)="onSettings()" [disabled]="status() === 'recording'" aria-label="Open settings">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
      <path d="M19.14 12.94c.04-.3.06-.61.06-.94s-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/>
    </svg>
  </button>

  <!-- Right: recorded videos sidebar -->
  <div class="sidebar-col">
    <app-recorded-videos-sidebar
      (play)="onPlay($event)"
      (delete)="onDeleteRequest($event)"
    />
  </div>

</div>

@if (activeBlobUrl()) {
  <app-video-player-modal
    [blobUrl]="activeBlobUrl()!"
    (close)="onClosePlayer()"
  />
}

@if (deleteTargetId()) {
  <app-delete-confirm-dialog
    [videoId]="deleteTargetId()!"
    (confirm)="onDeleteConfirm($event)"
    (cancel)="onDeleteCancel()"
  />
}

@if (settingsOpen()) {
  <app-settings-panel
    [currentQuality]="currentQuality()"
    [recommendedQuality]="recommendedQuality()"
    (close)="settingsOpen.set(false)"
  />
}

<app-toast />
